name: LinkedIn Job Scraper

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes (GitHub enforces 5-min minimum anyway)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

concurrency:
  group: scraper
  cancel-in-progress: true  # Kill old run when new one starts, prevents push conflicts

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Commit and push seen_jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json

          if git diff --staged --quiet; then
            echo "No changes to seen_jobs.json, skipping commit."
            exit 0
          fi

          git commit -m "Update seen_jobs.json [skip ci]"

          for attempt in 1 2 3 4 5; do
            echo "Push attempt $attempt..."
            git pull --rebase origin master && git push origin master && exit 0
            echo "Attempt $attempt failed. Retrying in 5s..."
            sleep 5
          done

          echo "All 5 push attempts failed."
          exit 1
